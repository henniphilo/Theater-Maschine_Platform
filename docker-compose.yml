# Immer vom Projektroot starten:
#   cd Theatermaschine
#   docker compose up --build
#
# Öffentliche Ports (Host):
#   3003 — Frontend
#   8000 — Backend API
# Intern: postgres:5432, redis:6379
# OSC (TouchDesigner): 7000 UDP — backend/.env OSC_PORT

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidebatte
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/aidebatte
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3003"]'
      DIRECTOR_DATA_DIR: data
      DIRECTOR_DRAMATURGY_MODE: llm
      DIRECTOR_EXECUTE_MODE: sequenced
      OSC_DRY_RUN: "false"
      OSC_LOG_COMMANDS: "true"
      OSC_LOG_PATH: logs/osc.log
      DIRECTOR_LOG_PATH: logs/director.log
      LIGHT_OUTPUT: tcp
      LIGHT_OSC_MIRROR: "true"
      LIGHT_TCP_HOST: "10.101.90.112"
      LIGHT_TCP_PORT: "3032"
      LIGHT_TCP_PROTOCOL: "1.0"
      LIGHT_TCP_CONNECT_DELAY: "0.5"
      LIGHT_TCP_HANDSHAKE: none
      LIGHT_OSC_TCP_FORMAT: binary
      LIGHT_OSC_TCP_FRAMING: length_prefix
      SOUND_OUTPUT: midi
      SOUND_MIDI_CHANNEL: "1"
    command: >
      sh -c "python -m app.db.init_db &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./data:/app/data
      - ./media:/app/media:ro
      - ./docs:/app/docs:ro
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    ports:
      - "3003:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  frontend_node_modules:
